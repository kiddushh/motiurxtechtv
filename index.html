<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Motiur X Tech Premium IPTV Player - Stream HD, FHD, and 4K Channels in real-time.">
  <title>Motiur X Tech - Premium IPTV Player</title>
  
  <!-- Fonts & Core Styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Shaka Player UI Styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.7.6/dist/controls.css">
  
  <!-- Custom Application Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- App Header -->
  <header>
    <div class="logo-container">
      <div class="logo-icon">
        <img src="https://tv.motiur.xyz/favicon.png" alt="Motiur X Tech TV" class="logo-img">
      </div>
      <span class="logo-text">Motiur X Tech TV</span>
    </div>
    
    <div class="status-badge">
      <div class="status-dot"></div>
      <span>Live Broadcast</span>
    </div>
  </header>

  <!-- Main Layout Container -->
  <main class="app-container">
    
    <!-- Player Column -->
    <section class="player-column">
      <div class="player-card">
        
        <!-- Player Wrapper with HTML5 Video + Loader Overlay -->
        <div class="player-wrapper">
          
          <!-- Shaka Video Container -->
          <div id="video-container" class="shaka-video-container" data-shaka-player-container>
            <video id="player" class="shaka-video" data-shaka-player playsinline crossorigin="anonymous"></video>
          </div>
          
          <!-- Playback States & Error Overlays -->
          <div id="player-overlay" class="player-overlay">
            <div id="overlay-content">
              <div class="spinner"></div>
              <div class="error-title">Initializing Player</div>
              <div class="error-message">Setting up playback engine...</div>
            </div>
          </div>
          
          <!-- DASH Quality Picker (shown only for DASH streams) -->
          <div id="quality-picker" class="quality-picker" style="display:none">
            <button id="quality-btn" class="quality-btn" title="Select Quality">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              <span id="quality-label">Auto</span>
            </button>
            <div id="quality-menu" class="quality-menu" style="display:none"></div>
          </div>
        </div>
        
        <!-- Channel Metadata Panel -->
        <div class="channel-meta-panel">
          <div class="channel-info-left">
            <span id="meta-badge" class="channel-meta-badge badge-hd">HD</span>
            <h1 id="active-alias" class="active-channel-title">Loading Stream...</h1>
            <span id="active-title" class="active-channel-alias">-</span>
            <p id="active-desc" class="active-channel-desc">Please wait while the stream is fetched and buffered.</p>
          </div>
        </div>
        
      </div>
    </section>

    <!-- Sidebar Column (Channel Search & Lists) -->
    <aside class="sidebar-column">
      <div class="sidebar-card">
        
        <!-- Search & Category Filters -->
        <div class="sidebar-header">
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="Search live channels...">
          </div>
          
          <div class="categories-container">
            <button class="category-tab active" data-category="all">All <span class="count">0</span></button>
            <button class="category-tab" data-category="HD">HD <span class="count">0</span></button>
            <button class="category-tab" data-category="FHD">FHD <span class="count">0</span></button>
            <button class="category-tab" data-category="4K">4K <span class="count">0</span></button>
          </div>
        </div>
        
        <!-- Channel Cards Wrapper -->
        <div class="channel-list-wrapper">
          <div id="channel-list" class="channel-list">
            <!-- Dynamically populated via app.js -->
          </div>
        </div>
        
      </div>
    </aside>
    
  </main>

  <!-- Toast Notification -->
  <div id="toast" class="toast">Action performed successfully</div>

  <!-- Footer Section -->
  <footer>
    <div class="footer-text">
      &copy; 2026 Motiur X Tech. Powered by Cloudflare CDN. Referer Origin Emulated via <a href="https://ritzembeds.pages.dev" target="_blank">RitzEmbeds</a>
    </div>
  </footer>

  <!-- Mux.js for HLS TS segment transmuxing & Shaka Player UI Core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mux.js/6.0.1/mux.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.6/dist/shaka-player.ui.js"></script>
  
  <!-- Custom Core Controller -->
  <script src="app.js"></script>
</body>
</html>
